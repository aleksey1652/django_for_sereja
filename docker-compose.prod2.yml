version: '3.7'
services:
  redis:
    image: "redis:alpine"
    restart: always
    container_name: redis
    command: redis-server
    ports:
      - 6379:6379
  web:
    build:
      context: ./
      dockerfile: Dockerfile.prod
    command:  bash -c "gunicorn sereja.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/home/app/web/static
      - media_volume:/home/app/web/media
    expose:
      - 8000
    env_file:
      - ./.env.dev
    links:
      - db
      - redis
    depends_on:
      - db
      - redis
  db:
    image: postgres:12.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=ser
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=ser_db
      - POSTGRES_HOST=db
  nginx:
    build: ./nginx
    volumes:
      - static_volume:/home/app/web/static
      - media_volume:/home/app/web/media
    ports:
      - 5222:80
    depends_on:
      - web
  celery:
    build: .
    container_name: celery
    command: celery -A sereja worker -l INFO
    volumes:
      - .:/home/app/web
    env_file:
      - ./.env.dev
    depends_on:
      - web
      - redis
  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A sereja beat -l INFO
    volumes:
      - .:/home/app/web
    env_file:
      - ./.env.dev
    depends_on:
      - web
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
